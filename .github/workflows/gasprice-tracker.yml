name: Gas Price Tracker

on:
  schedule:
    # UTC 21:00 = 5:00 PM EDT (Toronto summer) / 4:00 PM EST (Toronto winter)
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-gas-price-script:
    runs-on: ubuntu-latest
    environment: Gas price
    defaults:
      run:
        working-directory: ./gas-price

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 curl_cffi

      - name: Run main.py
        env:
          SENDER_EMAIL: ${{ secrets.USERNAME }}
          SENDER_PASS: ${{ secrets.PASSWORD }}
          USERS: ${{ vars.USERS }}
          ENABLE_EMAIL: ${{ vars.ENABLE_EMAIL }}
        run: python main.py
